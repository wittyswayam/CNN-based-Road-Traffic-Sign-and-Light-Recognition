# ==============================================================================
# TrafficVision-AI :: Docker Compose – Full Local Stack
# ==============================================================================
# Services:
#   api          – FastAPI inference server
#   worker       – Background training / batch inference worker
#   redis        – Inference cache + task queue
#   prometheus   – Metrics collection
#   grafana      – Dashboards
#   mlflow       – Experiment tracking
#   postgres     – MLflow metadata store
#
# Usage:
#   docker compose up -d
#   docker compose logs -f api
#   docker compose down -v   # remove volumes too
# ==============================================================================

version: "3.9"

networks:
  trafficvision:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
  mlflow_data:
  postgres_data:
  model_registry:

# ---------------------------------------------------------------------------
# Common anchors
# ---------------------------------------------------------------------------
x-common-env: &common-env
  APP_ENV: ${APP_ENV:-development}
  SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  MLFLOW_TRACKING_URI: http://mlflow:5000

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ---- Inference API -------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: trafficvision-ai:latest
    container_name: trafficvision_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      API_WORKERS: 4
    volumes:
      - model_registry:/app/models
      - ./configs:/app/configs:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - trafficvision
    <<: *logging

  # ---- Background Worker ---------------------------------------------------
  worker:
    image: trafficvision-ai:latest
    container_name: trafficvision_worker
    restart: unless-stopped
    command: ["python", "-m", "scripts.worker"]
    environment:
      <<: *common-env
      WORKER_CONCURRENCY: 2
    volumes:
      - model_registry:/app/models
    depends_on:
      - redis
      - mlflow
    networks:
      - trafficvision
    <<: *logging

  # ---- Redis ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: trafficvision_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trafficvision

  # ---- Prometheus ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: trafficvision_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - trafficvision

  # ---- Grafana -------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: trafficvision_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - trafficvision

  # ---- PostgreSQL (MLflow backend) -----------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: trafficvision_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trafficvision

  # ---- MLflow --------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: trafficvision_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:${POSTGRES_PASSWORD:-mlflow_dev}@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:${POSTGRES_PASSWORD:-mlflow_dev}@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trafficvision
    <<: *logging
